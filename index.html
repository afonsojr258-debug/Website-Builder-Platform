            document.getElementById('loginForm')?.addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('loginEmail').value;
                const password = document.getElementById('loginPassword').value;
                try {
                    await signInWithEmailAndPassword(auth, email, password);
                    showToast('Login successful!', 'success');
                } catch (error) {
                    showToast(error.message, 'error');
                }
            });
            
            document.getElementById('registerForm')?.addEventListener('submit', async (e) => {
                e.preventDefault();
                const name = document.getElementById('registerName').value;
                const email = document.getElementById('registerEmail').value;
                const password = document.getElementById('registerPassword').value;
                try {
                    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                    await updateProfile(userCredential.user, { displayName: name });
                    showToast('Account created successfully!', 'success');
                } catch (error) {
                    showToast(error.message, 'error');
                }
            });
            
            document.getElementById('showRegisterBtn')?.addEventListener('click', () => showPage('registerPage'));
            document.getElementById('showLoginBtn')?.addEventListener('click', () => showPage('loginPage'));
            document.getElementById('createSiteBtn')?.addEventListener('click', () => openCreateModal());
            document.getElementById('createSiteLink')?.addEventListener('click', () => openCreateModal());
            document.getElementById('confirmCreateBtn')?.addEventListener('click', () => createSite());
            document.getElementById('cancelCreateBtn')?.addEventListener('click', () => closeCreateModal());
            document.getElementById('saveSiteBtn')?.addEventListener('click', () => saveSite());
            document.getElementById('closeEditorBtn')?.addEventListener('click', () => closeEditor());
            document.getElementById('logoutBtn')?.addEventListener('click', async () => {
                await signOut(auth);
                showToast('Logged out', 'success');
            });
            
            document.querySelectorAll('.template-card').forEach(card => {
                card.addEventListener('click', () => {
                    document.querySelectorAll('.template-card').forEach(c => c.classList.remove('selected'));
                    card.classList.add('selected');
                    document.getElementById('selectedTemplate').value = card.dataset.template;
                });
            });
            
            document.getElementById('siteSlug')?.addEventListener('input', (e) => {
                const preview = document.getElementById('slugPreview');
                if (preview) preview.textContent = e.target.value || 'mysite';
            });
        }
        
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }
        
        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        async function loadDashboard() {
            if (!currentUser) return;
            
            const sitesGrid = document.getElementById('sitesGrid');
            sitesGrid.innerHTML = '<div class="loading">Loading your sites...</div>';
            
            try {
                const q = query(collection(db, 'sites'), where('userId', '==', currentUser.uid));
                const snapshot = await getDocs(q);
                
                document.getElementById('userName').innerHTML = currentUser.displayName || currentUser.email;
                
                if (snapshot.empty) {
                    sitesGrid.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-crown"></i>
                            <h3>Create your first website</h3>
                            <p style="color:#64748b; margin-bottom:24px;">Choose from professional templates and start now</p>
                            <button class="btn-primary" id="emptyCreateBtn">Create Website</button>
                        </div>
                    `;
                    document.getElementById('emptyCreateBtn')?.addEventListener('click', () => openCreateModal());
                    return;
                }
                
                sitesGrid.innerHTML = '';
                snapshot.forEach(doc => {
                    const site = doc.data();
                    sitesGrid.innerHTML += `
                        <div class="site-card">
                            <div class="site-card-header">
                                <div class="site-icon"><i class="fas ${templates[site.template]?.icon || 'fa-globe'}"></i></div>
                                <div class="site-info">
                                    <h3>${escapeHtml(site.title)}</h3>
                                    <p>/${site.slug}</p>
                                    <span class="badge">${templates[site.template]?.name || 'Template'}</span>
                                </div>
                            </div>
                            <div class="site-card-actions">
                                <button class="btn-outline" onclick="window.editSiteById('${doc.id}')">Edit</button>
                                <button class="btn-outline" onclick="window.open('/${site.slug}', '_blank')">View</button>
                                <button class="btn-outline" style="border-color:#fee2e2; color:#dc2626;" onclick="window.deleteSiteById('${doc.id}')">Delete</button>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                sitesGrid.innerHTML = `<div class="empty-state">Error: ${error.message}</div>`;
            }
        }
        
        window.editSiteById = async (siteId) => {
            try {
                const docRef = doc(db, 'sites', siteId);
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) {
                    currentEditingSite = { id: docSnap.id, ...docSnap.data() };
                    showEditor();
                } else {
                    showToast('Site not found', 'error');
                }
            } catch (error) {
                showToast('Error loading site: ' + error.message, 'error');
            }
        };
        
        window.deleteSiteById = async (siteId) => {
            if (!confirm('Are you sure? This action cannot be undone.')) return;
            try {
                await deleteDoc(doc(db, 'sites', siteId));
                showToast('Site deleted successfully', 'success');
                loadDashboard();
            } catch (error) {
                showToast('Error deleting site', 'error');
            }
        };
        
        function showEditor() {
            showPage('editorPage');
            document.getElementById('editorTitle').innerHTML = `Editing: ${currentEditingSite.title}`;
            
            let html = '';
            const content = currentEditingSite.content;
            
            // Basic Information Section
            html += `<div class="editor-section"><h4>Basic Information</h4>`;
            const basicFields = ['heroTitle', 'heroSubtitle', 'companyName', 'tagline', 'name', 'title', 'aboutTitle', 'aboutText', 'description', 'bio'];
            for (let field of basicFields) {
                if (content[field] !== undefined) {
                    html += `
                        <div class="editor-field">
                            <label>${field.replace(/([A-Z])/g, ' $1').replace(/^./, str => str.toUpperCase())}</label>
                            <input type="text" id="field_${field}" value="${escapeHtml(content[field])}">
                        </div>
                    `;
                }
            }
            html += `</div>`;
            
            // Colors Section
            html += `<div class="editor-section"><h4>Colors</h4>`;
            const colorFields = ['primaryColor', 'secondaryColor'];
            for (let field of colorFields) {
                if (content[field] !== undefined) {
                    html += `
                        <div class="editor-field">
                            <label>${field.replace(/([A-Z])/g, ' $1').replace(/^./, str => str.toUpperCase())}</label>
                            <div class="color-input-group">
                                <input type="color" id="field_${field}" value="${content[field]}">
                                <input type="text" value="${content[field]}" style="flex:1;" id="field_${field}_text" onchange="document.getElementById('field_${field}').value = this.value; document.getElementById('field_${field}').dispatchEvent(new Event('change'))">
                            </div>
                        </div>
                    `;
                }
            }
            html += `</div>`;
            
            // Font Section
            html += `<div class="editor-section"><h4>Typography</h4>`;
            html += `
                <div class="editor-field">
                    <label>Font Family</label>
                    <select id="field_fontFamily">
                        ${fontOptions.map(font => `<option value="${font.value}" ${content.fontFamily === font.value ? 'selected' : ''}>${font.label} (${font.category})</option>`).join('')}
                    </select>
                </div>
            `;
            html += `</div>`;
            
            // Contact Section
            html += `<div class="editor-section"><h4>Contact & WhatsApp</h4>`;
            const contactFields = ['showWhatsapp', 'whatsappNumber', 'whatsappMessage', 'showEmail', 'emailAddress', 'showPhone', 'phoneNumber'];
            for (let field of contactFields) {
                if (content[field] !== undefined) {
                    if (typeof content[field] === 'boolean') {
                        html += `
                            <div class="editor-field">
                                <label style="display:flex; align-items:center; gap:8px; cursor:pointer;">
                                    <input type="checkbox" id="field_${field}" ${content[field] ? 'checked' : ''}> Enable ${field.replace('show', '').replace(/([A-Z])/g, ' $1')}
                                </label>
                            </div>
                        `;
                    } else {
                        html += `
                            <div class="editor-field">
                                <label>${field.replace(/([A-Z])/g, ' $1').replace(/^./, str => str.toUpperCase())}</label>
                                <input type="text" id="field_${field}" value="${escapeHtml(content[field])}" placeholder="Enter ${field}">
                            </div>
                        `;
                    }
                }
            }
            html += `</div>`;
            
            // Services Section with Icon Selector
            if (content.services && Array.isArray(content.services)) {
                html += `<div class="editor-section"><h4>Services</h4>`;
                content.services.forEach((service, index) => {
                    html += `
                        <div style="border:1px solid #e2e8f0; border-radius:16px; padding:16px; margin-bottom:16px;">
                            <div class="editor-field">
                                <label>Service Name</label>
                                <input type="text" id="service_name_${index}" value="${escapeHtml(service.name)}">
                            </div>
                            <div class="editor-field">
                                <label>Description</label>
                                <input type="text" id="service_desc_${index}" value="${escapeHtml(service.description)}">
                            </div>
                            <div class="editor-field">
                                <label>Icon</label>
                                <div class="icon-selector" id="icon_selector_${index}">
                                    ${iconOptions.map(icon => `
                                        <div class="icon-option ${service.icon === icon ? 'selected' : ''}" data-icon="${icon}">
                                            <i class="fas ${icon}"></i>
                                        </div>
                                    `).join('')}
                                </div>
                                <input type="hidden" id="service_icon_${index}" value="${service.icon || 'fa-star'}">
                            </div>
                        </div>
                    `;
                });
                html += `<button class="btn-outline" id="addServiceBtn" style="width:100%;">+ Add Service</button>`;
                html += `</div>`;
            }
            
            document.getElementById('editorFields').innerHTML = html;
            
            // Attach event listeners for all fields
            for (let [key, value] of Object.entries(content)) {
                const field = document.getElementById(`field_${key}`);
                if (field) {
                    if (field.type === 'checkbox') {
                        field.addEventListener('change', async (e) => {
                            content[key] = e.target.checked;
                            await updateDoc(doc(db, 'sites', currentEditingSite.id), { content: content });
                            showToast('Saved!', 'success');
                            updatePreview();
                        });
                    } else if (field.type === 'select-one') {
                        field.addEventListener('change', async (e) => {
                            content[key] = e.target.value;
                            await updateDoc(doc(db, 'sites', currentEditingSite.id), { content: content });
                            showToast('Saved!', 'success');
                            updatePreview();
                        });
                    } else {
                        field.addEventListener('change', async (e) => {
                            content[key] = e.target.value;
                            await updateDoc(doc(db, 'sites', currentEditingSite.id), { content: content });
                            showToast('Saved!', 'success');
                            updatePreview();
                        });
                    }
                }
            }
            
            // Color text fields
            for (let field of colorFields) {
                const textField = document.getElementById(`field_${field}_text`);
                if (textField) {
                    textField.addEventListener('change', async (e) => {
                        content[field] = e.target.value;
                        const colorField = document.getElementById(`field_${field}`);
                        if (colorField) colorField.value = e.target.value;
                        await updateDoc(doc(db, 'sites', currentEditingSite.id), { content: content });
                        showToast('Saved!', 'success');
                        updatePreview();
                    });
                }
            }
            
            // Service fields
            if (content.services) {
                for (let i = 0; i < content.services.length; i++) {
                    const nameField = document.getElementById(`service_name_${i}`);
                    const descField = document.getElementById(`service_desc_${i}`);
                    const iconField = document.getElementById(`service_icon_${i}`);
                    
                    if (nameField) {
                        nameField.addEventListener('change', async (e) => {
                            content.services[i].name = e.target.value;
                            await updateDoc(doc(db, 'sites', currentEditingSite.id), { content: content });
                            showToast('Saved!', 'success');
                            updatePreview();
                        });
                    }
                    if (descField) {
                        descField.addEventListener('change', async (e) => {
                            content.services[i].description = e.target.value;
                            await updateDoc(doc(db, 'sites', currentEditingSite.id), { content: content });
                            showToast('Saved!', 'success');
                            updatePreview();
                        });
                    }
                    
                    // Icon selector
                    const selector = document.getElementById(`icon_selector_${i}`);
                    if (selector) {
                        selector.querySelectorAll('.icon-option').forEach(opt => {
                            opt.addEventListener('click', () => {
                                selector.querySelectorAll('.icon-option').forEach(o => o.classList.remove('selected'));
                                opt.classList.add('selected');
                                const icon = opt.dataset.icon;
                                content.services[i].icon = icon;
                                if (iconField) iconField.value = icon;
                                updateDoc(doc(db, 'sites', currentEditingSite.id), { content: content });
                                showToast('Icon updated!', 'success');
                                updatePreview();
                            });
                        });
                    }
                }
            }
            
            // Add service button
            const addBtn = document.getElementById('addServiceBtn');
            if (addBtn) {
                addBtn.addEventListener('click', async () => {
                    content.services.push({ name: 'New Service', description: 'Service description', icon: 'fa-star' });
                    await updateDoc(doc(db, 'sites', currentEditingSite.id), { content: content });
                    showToast('Service added!', 'success');
                    showEditor(); // Refresh editor
                });
            }
            
            updatePreview();
        }
        
        function updatePreview() {
            const preview = document.getElementById('livePreview');
            if (preview && currentEditingSite) {
                preview.innerHTML = renderSitePreview(currentEditingSite);
            }
        }
        
        function renderSitePreview(site) {
            const c = site.content;
            
            let fontFamily = 'Inter, sans-serif';
            if (c.fontFamily === 'Playfair Display') fontFamily = "'Playfair Display', serif";
            else if (c.fontFamily === 'Poppins') fontFamily = "'Poppins', sans-serif";
            else if (c.fontFamily === 'Montserrat') fontFamily = "'Montserrat', sans-serif";
            else if (c.fontFamily === 'Roboto') fontFamily = "'Roboto', sans-serif";
            
            const primaryColor = c.primaryColor || '#6366f1';
            const secondaryColor = c.secondaryColor || '#8b5cf6';
            
            return `
                <div style="font-family:${fontFamily};">
                    <div style="min-height:60vh; background:linear-gradient(135deg, ${primaryColor}, ${secondaryColor}); display:flex; align-items:center; justify-content:center; text-align:center; color:white; padding:40px 20px;">
                        <div style="max-width:800px;">
                            <h1 style="font-size:48px; margin-bottom:16px; font-weight:800;">${c.heroTitle || c.companyName || c.name || 'My Website'}</h1>
                            <p style="font-size:20px; opacity:0.95;">${c.heroSubtitle || c.tagline || c.title || 'Welcome'}</p>
                            <div style="margin-top:32px; display:flex; gap:16px; justify-content:center; flex-wrap:wrap;">
                                ${c.showWhatsapp ? `<a href="https://wa.me/${c.whatsappNumber}?text=${encodeURIComponent(c.whatsappMessage || 'Hello!')}" target="_blank" style="padding:12px 28px; background:white; border-radius:50px; text-decoration:none; color:${primaryColor}; font-weight:600; transition:transform 0.2s;">WhatsApp</a>` : ''}
                                ${c.showEmail ? `<a href="mailto:${c.emailAddress}" style="padding:12px 28px; background:rgba(255,255,255,0.2); border-radius:50px; text-decoration:none; color:white; font-weight:600;">Email</a>` : ''}
                                ${c.showPhone ? `<a href="tel:${c.phoneNumber}" style="padding:12px 28px; background:rgba(255,255,255,0.2); border-radius:50px; text-decoration:none; color:white; font-weight:600;">Call Us</a>` : ''}
                            </div>
                        </div>
                    </div>
                    <div style="max-width:1200px; margin:0 auto; padding:60px 20px;">
                        ${c.aboutText ? `
                            <div style="text-align:center; margin-bottom:60px;">
                                <h2 style="font-size:36px; margin-bottom:20px;">${c.aboutTitle || 'About Us'}</h2>
                                <p style="font-size:18px; color:#475569; max-width:800px; margin:0 auto;">${c.aboutText}</p>
                            </div>
                        ` : ''}
                        ${c.bio ? `
                            <div style="text-align:center; margin-bottom:60px;">
                                <p style="font-size:18px; color:#475569; max-width:800px; margin:0 auto;">${c.bio}</p>
                            </div>
                        ` : ''}
                        ${c.description ? `
                            <div style="text-align:center; margin-bottom:60px;">
                                <p style="font-size:18px; color:#475569; max-width:800px; margin:0 auto;">${c.description}</p>
                            </div>
                        ` : ''}
                        ${c.services && c.services.length > 0 ? `
                            <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(280px,1fr)); gap:30px;">
                                ${c.services.map(s => `
                                    <div style="text-align:center; padding:40px 30px; background:white; border-radius:24px; box-shadow:0 4px 20px rgba(0,0,0,0.08); transition:transform 0.3s;">
                                        <i class="fas ${s.icon || 'fa-star'}" style="font-size:48px; color:${primaryColor}; margin-bottom:20px;"></i>
                                        <h3 style="margin-bottom:10px; font-size:22px;">${s.name}</h3>
                                        <p style="color:#64748b;">${s.description || ''}</p>
                                    </div>
                                `).join('')}
                            </div>
                        ` : ''}
                    </div>
                </div>
            `;
        }
        
        async function saveSite() {
            if (currentEditingSite) {
                try {
                    await updateDoc(doc(db, 'sites', currentEditingSite.id), { 
                        content: currentEditingSite.content,
                        updatedAt: new Date().toISOString()
                    });
                    showToast('Website saved successfully!', 'success');
                } catch (error) {
                    showToast('Error saving: ' + error.message, 'error');
                }
            }
        }
        
        function closeEditor() {
            currentEditingSite = null;
            showPage('dashboardPage');
            loadDashboard();
        }
        
        function openCreateModal() {
            document.getElementById('createModal').classList.add('active');
            const firstCard = document.querySelector('.template-card');
            if (firstCard) firstCard.classList.add('selected');
        }
        
        function closeCreateModal() {
            document.getElementById('createModal').classList.remove('active');
            document.getElementById('siteTitle').value = '';
            document.getElementById('siteSlug').value = '';
        }
        
        async function createSite() {
            const title = document.getElementById('siteTitle').value;
            const slug = document.getElementById('siteSlug').value;
            const templateId = document.getElementById('selectedTemplate').value;
            
            if (!title || !slug) {
                showToast('Please fill all fields', 'error');
                return;
            }
            
            try {
                const siteData = {
                    title: title,
                    slug: slug.toLowerCase().replace(/[^a-z0-9]/g, ''),
                    template: templateId,
                    content: JSON.parse(JSON.stringify(templates[templateId].structure)),
                    userId: currentUser.uid,
                    createdAt: new Date().toISOString(),
                    published: true
                };
                
                await addDoc(collection(db, 'sites'), siteData);
                showToast('Website created successfully!', 'success');
                closeCreateModal();
                loadDashboard();
            } catch (error) {
                showToast('Error: ' + error.message, 'error');
            }
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        async function viewPublicSite(slug) {
            try {
                const q = query(collection(db, 'sites'), where('slug', '==', slug), where('published', '==', true));
                const snapshot = await getDocs(q);
                
                if (snapshot.empty) {
                    document.getElementById('app').innerHTML = `
                        <div style="min-height:100vh; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:20px;">
                            <i class="fas fa-search" style="font-size:64px; color:#cbd5e0;"></i>
                            <h2>Website Not Found</h2>
                            <a href="/" style="color:#6366f1;">← Back to WebCraft Pro</a>
                        </div>
                    `;
                    return;
                }
                
                const site = snapshot.docs[0].data();
                document.getElementById('app').innerHTML = renderSitePreview({ content: site.content });
                document.getElementById('app').innerHTML += `<footer style="text-align:center; padding:24px; background:#f8fafc; color:#94a3b8; font-size:14px;">Created with WebCraft Pro</footer>`;
            } catch (error) {
                document.getElementById('app').innerHTML = `<div style="padding:40px;">Error: ${error.message}</div>`;
            }
        }
        
        renderApp();
        
        const slug = window.location.pathname.substring(1);
        if (slug && slug !== '') {
            viewPublicSite(slug);
        } else {
            onAuthStateChanged(auth, (user) => {
                currentUser = user;
                if (user) {
                    showPage('dashboardPage');
                    loadDashboard();
                } else {
                    showPage('loginPage');
                }
            });
        }
    </script>
</body>
</html>
