                            <div class="sidebar-logo">
                                <img src="https://i.postimg.cc/xdPxvPJD/20260421-093634.png" alt="Logo">
                                <span>WebCraft Pro</span>
                            </div>
                            <ul class="sidebar-menu">
                                <li><a id="dashboardLink" class="active"><i class="fas fa-th-large"></i> My Sites</a></li>
                                <li><a id="createSiteLink"><i class="fas fa-plus-circle"></i> Create Site</a></li>
                            </ul>
                            <div class="sidebar-footer">
                                <div class="user-info" style="display:flex; align-items:center; gap:12px; margin-bottom:16px;">
                                    <i class="fas fa-user-circle" style="font-size:32px; color:#6366f1;"></i>
                                    <div><div style="font-weight:600;" id="userName"></div><div style="font-size:12px;">Free Plan</div></div>
                                </div>
                                <button id="logoutBtn" class="btn-outline" style="width:100%;">Sign Out</button>
                            </div>
                        </aside>
                        <main class="main-content">
                            <div class="dashboard-header" style="display:flex; justify-content:space-between; margin-bottom:32px;">
                                <h1>My Websites</h1>
                                <button id="createSiteBtn" class="btn-primary">+ New Site</button>
                            </div>
                            <div id="sitesGrid"></div>
                        </main>
                    </div>
                </div>
                
                <div id="editorPage" class="page">
                    <div class="editor-layout">
                        <div class="editor-sidebar">
                            <h3 id="editorTitle"></h3>
                            <div id="editorFields"></div>
                            <button id="saveSiteBtn" class="btn-primary" style="margin-top:20px;">Save Changes</button>
                            <button id="closeEditorBtn" class="btn-outline" style="margin-top:10px;">← Back</button>
                        </div>
                        <div class="editor-preview">
                            <h3>Live Preview</h3>
                            <div id="livePreview"></div>
                        </div>
                    </div>
                </div>
                
                <div id="createModal" class="modal">
                    <div class="modal-content">
                        <h2>Create New Website</h2>
                        <div class="input-group">
                            <label>Site Name</label>
                            <input type="text" id="siteTitle" placeholder="My Portfolio">
                        </div>
                        <div class="input-group">
                            <label>Site Slug (URL)</label>
                            <input type="text" id="siteSlug" placeholder="myportfolio">
                        </div>
                        <div class="input-group">
                            <label>Choose Template</label>
                            <input type="hidden" id="selectedTemplate" value="modern">
                            ${Object.entries(templates).map(([id, t]) => `
                                <div class="template-card" data-template="${id}">
                                    <i class="fas ${t.icon}"></i> ${t.name}
                                    <p style="font-size:13px; color:#64748b;">${t.description}</p>
                                </div>
                            `).join('')}
                        </div>
                        <button id="confirmCreateBtn" class="btn-primary">Create Site</button>
                        <button id="cancelCreateBtn" class="btn-outline" style="margin-top:10px;">Cancel</button>
                    </div>
                </div>
                
                <div id="toast" class="toast"></div>
            `;
            attachEvents();
        }
        
        function attachEvents() {
            document.getElementById('loginForm')?.addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('loginEmail').value;
                const password = document.getElementById('loginPassword').value;
                try {
                    await signInWithEmailAndPassword(auth, email, password);
                    showToast('Login successful!', 'success');
                } catch (error) {
                    showToast(error.message, 'error');
                }
            });
            
            document.getElementById('registerForm')?.addEventListener('submit', async (e) => {
                e.preventDefault();
                const name = document.getElementById('registerName').value;
                const email = document.getElementById('registerEmail').value;
                const password = document.getElementById('registerPassword').value;
                try {
                    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                    await updateProfile(userCredential.user, { displayName: name });
                    showToast('Account created!', 'success');
                } catch (error) {
                    showToast(error.message, 'error');
                }
            });
            
            document.getElementById('showRegisterBtn')?.addEventListener('click', () => showPage('registerPage'));
            document.getElementById('showLoginBtn')?.addEventListener('click', () => showPage('loginPage'));
            document.getElementById('createSiteBtn')?.addEventListener('click', () => openCreateModal());
            document.getElementById('createSiteLink')?.addEventListener('click', () => openCreateModal());
            document.getElementById('confirmCreateBtn')?.addEventListener('click', () => createSite());
            document.getElementById('cancelCreateBtn')?.addEventListener('click', () => closeCreateModal());
            document.getElementById('saveSiteBtn')?.addEventListener('click', () => saveSite());
            document.getElementById('closeEditorBtn')?.addEventListener('click', () => closeEditor());
            document.getElementById('logoutBtn')?.addEventListener('click', async () => {
                await signOut(auth);
                showToast('Logged out', 'success');
            });
            
            document.querySelectorAll('.template-card').forEach(card => {
                card.addEventListener('click', () => {
                    document.querySelectorAll('.template-card').forEach(c => c.classList.remove('selected'));
                    card.classList.add('selected');
                    document.getElementById('selectedTemplate').value = card.dataset.template;
                });
            });
            
            document.getElementById('siteSlug')?.addEventListener('input', (e) => {
                const preview = document.getElementById('slugPreview');
                if (preview) preview.textContent = e.target.value || 'mysite';
            });
        }
        
        window.showLoginPage = () => showPage('loginPage');
        window.showRegisterPage = () => showPage('registerPage');
        
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }
        
        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        async function loadDashboard() {
            if (!currentUser) return;
            
            const sitesGrid = document.getElementById('sitesGrid');
            sitesGrid.innerHTML = '<div class="loading">Loading...</div>';
            
            try {
                const q = query(collection(db, 'sites'), where('userId', '==', currentUser.uid));
                const snapshot = await getDocs(q);
                
                document.getElementById('userName').innerHTML = currentUser.displayName || currentUser.email;
                
                if (snapshot.empty) {
                    sitesGrid.innerHTML = `<div class="empty-state"><h3>Create your first website</h3><button class="btn-primary" id="emptyCreateBtn">Create Website</button></div>`;
                    document.getElementById('emptyCreateBtn')?.addEventListener('click', () => openCreateModal());
                    return;
                }
                
                sitesGrid.innerHTML = '';
                snapshot.forEach(doc => {
                    const site = doc.data();
                    sitesGrid.innerHTML += `
                        <div class="site-card">
                            <div class="site-card-header">
                                <div class="site-icon"><i class="fas ${templates[site.template]?.icon || 'fa-globe'}"></i></div>
                                <div><h3>${escapeHtml(site.title)}</h3><p>/${site.slug}</p></div>
                            </div>
                            <div class="site-card-actions">
                                <button class="btn-outline" onclick="window.editSiteById('${doc.id}')">Edit</button>
                                <button class="btn-outline" onclick="window.open('/${site.slug}', '_blank')">View</button>
                                <button class="btn-outline" style="color:#dc2626;" onclick="window.deleteSiteById('${doc.id}')">Delete</button>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                sitesGrid.innerHTML = `<div>Error: ${error.message}</div>`;
            }
        }
        
        window.editSiteById = async (siteId) => {
            const docRef = doc(db, 'sites', siteId);
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) {
                currentEditingSite = { id: docSnap.id, ...docSnap.data() };
                showEditor();
            }
        };
        
        window.deleteSiteById = async (siteId) => {
            if (!confirm('Are you sure?')) return;
            await deleteDoc(doc(db, 'sites', siteId));
            showToast('Site deleted', 'success');
            loadDashboard();
        };
        
        function showEditor() {
            showPage('editorPage');
            const content = currentEditingSite.content;
            
            let html = `
                <div class="editor-section"><h4>Hero Section</h4>
                    <div class="editor-field"><label>Title</label><input type="text" id="heroTitle" value="${escapeHtml(content.heroTitle || content.companyName || '')}"></div>
                    <div class="editor-field"><label>Subtitle</label><input type="text" id="heroSubtitle" value="${escapeHtml(content.heroSubtitle || content.tagline || '')}"></div>
                </div>
                <div class="editor-section"><h4>Colors</h4>
                    <div class="editor-field"><label>Primary Color</label><div class="color-input-group"><input type="color" id="primaryColor" value="${content.primaryColor || '#6366f1'}"><input type="text" id="primaryColorText" value="${content.primaryColor || '#6366f1'}"></div></div>
                    <div class="editor-field"><label>Secondary Color</label><div class="color-input-group"><input type="color" id="secondaryColor" value="${content.secondaryColor || '#8b5cf6'}"><input type="text" id="secondaryColorText" value="${content.secondaryColor || '#8b5cf6'}"></div></div>
                </div>
                <div class="editor-section"><h4>Typography</h4>
                    <div class="editor-field"><label>Font</label><select id="fontFamily">${fontOptions.map(f => `<option value="${f.value}" ${content.fontFamily === f.value ? 'selected' : ''}>${f.label}</option>`).join('')}</select></div>
                </div>
                <div class="editor-section"><h4>WhatsApp & Contact</h4>
                    <div class="editor-field"><label><input type="checkbox" id="showWhatsapp" ${content.showWhatsapp ? 'checked' : ''}> Enable WhatsApp Button</label></div>
                    <div class="editor-field"><label>WhatsApp Number</label><input type="text" id="whatsappNumber" value="${escapeHtml(content.whatsappNumber || '')}"></div>
                    <div class="editor-field"><label>WhatsApp Message</label><input type="text" id="whatsappMessage" value="${escapeHtml(content.whatsappMessage || '')}"></div>
                    <div class="editor-field"><label><input type="checkbox" id="showEmail" ${content.showEmail ? 'checked' : ''}> Enable Email Button</label></div>
                    <div class="editor-field"><label>Email Address</label><input type="email" id="emailAddress" value="${escapeHtml(content.emailAddress || '')}"></div>
                </div>
                <div class="editor-section"><h4>Custom Buttons</h4>
                    <div id="buttonsContainer"></div>
                    <button class="btn-outline" id="addButtonBtn" style="width:100%; margin-top:8px;">+ Add Button</button>
                </div>
            `;
            
            document.getElementById('editorFields').innerHTML = html;
            
            // Load buttons
            const buttons = content.buttons || [];
            const buttonsContainer = document.getElementById('buttonsContainer');
            function renderButtons() {
                buttonsContainer.innerHTML = buttons.map((btn, idx) => `
                    <div class="btn-card">
                        <input type="text" placeholder="Button Text" value="${escapeHtml(btn.text)}" data-btn-index="${idx}" data-btn-field="text" style="width:100%; margin-bottom:8px;">
                        <input type="text" placeholder="Button URL" value="${escapeHtml(btn.url)}" data-btn-index="${idx}" data-btn-field="url" style="width:100%; margin-bottom:8px;">
                        <select data-btn-index="${idx}" data-btn-field="type" style="width:100%; margin-bottom:8px;">
                            <option value="primary" ${btn.type === 'primary' ? 'selected' : ''}>Primary Button</option>
                            <option value="secondary" ${btn.type === 'secondary' ? 'selected' : ''}>Secondary Button</option>
                        </select>
                        <button class="btn-outline remove-btn" data-btn-index="${idx}" style="width:100%; background:#fee2e2; color:#dc2626;">Remove</button>
                    </div>
                `).join('');
                
                document.querySelectorAll('[data-btn-field]').forEach(input => {
                    input.addEventListener('change', (e) => {
                        const idx = parseInt(e.target.dataset.btnIndex);
                        const field = e.target.dataset.btnField;
                        buttons[idx][field] = e.target.value;
                        updateSiteContent();
                    });
                });
                
                document.querySelectorAll('.remove-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const idx = parseInt(e.target.dataset.btnIndex);
                        buttons.splice(idx, 1);
                        renderButtons();
                        updateSiteContent();
                    });
                });
            }
            renderButtons();
            
            document.getElementById('addButtonBtn')?.addEventListener('click', () => {
                buttons.push({ text: 'New Button', url: '#', type: 'primary' });
                renderButtons();
                updateSiteContent();
            });
            
            // Attach all change events
            const fields = ['heroTitle', 'heroSubtitle', 'primaryColor', 'secondaryColor', 'fontFamily', 'whatsappNumber', 'whatsappMessage', 'emailAddress'];
            fields.forEach(field => {
                const el = document.getElementById(field);
                if (el) el.addEventListener('change', () => updateSiteContent());
            });
            
            document.getElementById('showWhatsapp')?.addEventListener('change', () => updateSiteContent());
            document.getElementById('showEmail')?.addEventListener('change', () => updateSiteContent());
            
            const colorTexts = ['primaryColorText', 'secondaryColorText'];
            colorTexts.forEach(ct => {
                const el = document.getElementById(ct);
                if (el) {
                    el.addEventListener('change', (e) => {
                        const colorField = ct.replace('Text', '');
                        document.getElementById(colorField).value = e.target.value;
                        updateSiteContent();
                    });
                }
            });
            
            async function updateSiteContent() {
                currentEditingSite.content.heroTitle = document.getElementById('heroTitle')?.value || '';
                currentEditingSite.content.heroSubtitle = document.getElementById('heroSubtitle')?.value || '';
                currentEditingSite.content.primaryColor = document.getElementById('primaryColor')?.value || '#6366f1';
                currentEditingSite.content.secondaryColor = document.getElementById('secondaryColor')?.value || '#8b5cf6';
                currentEditingSite.content.fontFamily = document.getElementById('fontFamily')?.value || 'Inter';
                currentEditingSite.content.showWhatsapp = document.getElementById('showWhatsapp')?.checked || false;
                currentEditingSite.content.whatsappNumber = document.getElementById('whatsappNumber')?.value || '';
                currentEditingSite.content.whatsappMessage = document.getElementById('whatsappMessage')?.value || '';
                currentEditingSite.content.showEmail = document.getElementById('showEmail')?.checked || false;
                currentEditingSite.content.emailAddress = document.getElementById('emailAddress')?.value || '';
                currentEditingSite.content.buttons = buttons;
                
                await updateDoc(doc(db, 'sites', currentEditingSite.id), { content: currentEditingSite.content });
                updatePreview();
                showToast('Auto-saved', 'success');
            }
            
            updatePreview();
        }
        
        function updatePreview() {
            const preview = document.getElementById('livePreview');
            if (preview && currentEditingSite) {
                preview.innerHTML = renderSitePreview(currentEditingSite);
            }
        }
        
        function renderSitePreview(site) {
            const c = site.content;
            const fontFamily = c.fontFamily === 'Playfair Display' ? "'Playfair Display', serif" : c.fontFamily === 'Poppins' ? "'Poppins', sans-serif" : 'Inter, sans-serif';
            const primary = c.primaryColor || '#6366f1';
            const secondary = c.secondaryColor || '#8b5cf6';
            
            return `
                <div style="font-family:${fontFamily};">
                    <div style="min-height:50vh; background:linear-gradient(135deg, ${primary}, ${secondary}); display:flex; align-items:center; justify-content:center; text-align:center; color:white; padding:40px;">
                        <div>
                            <h1 style="font-size:48px; margin-bottom:16px;">${c.heroTitle || c.companyName || 'My Website'}</h1>
                            <p style="font-size:20px;">${c.heroSubtitle || c.tagline || 'Welcome'}</p>
                            <div style="margin-top:32px; display:flex; gap:16px; justify-content:center; flex-wrap:wrap;">
                                ${c.buttons?.map(btn => `<a href="${btn.url}" style="padding:12px 28px; background:${btn.type === 'primary' ? 'white' : 'rgba(255,255,255,0.2)'}; border-radius:50px; text-decoration:none; color:${btn.type === 'primary' ? primary : 'white'}; font-weight:600;">${btn.text}</a>`).join('')}
                                ${c.showWhatsapp ? `<a href="https://wa.me/${c.whatsappNumber}?text=${encodeURIComponent(c.whatsappMessage || 'Hello!')}" target="_blank" style="padding:12px 28px; background:white; border-radius:50px; text-decoration:none; color:${primary}; font-weight:600;">WhatsApp</a>` : ''}
                                ${c.showEmail ? `<a href="mailto:${c.emailAddress}" style="padding:12px 28px; background:rgba(255,255,255,0.2); border-radius:50px; text-decoration:none; color:white; font-weight:600;">Email</a>` : ''}
                            </div>
                        </div>
                    </div>
                    <div style="max-width:1000px; margin:0 auto; padding:60px 20px;">
                        <p style="text-align:center; font-size:18px; color:#475569;">${c.aboutText || c.description || ''}</p>
                        ${c.services && c.services.length > 0 ? `
                            <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(250px,1fr)); gap:30px; margin-top:60px;">
                                ${c.services.map(s => `
                                    <div style="text-align:center; padding:30px; background:white; border-radius:20px;">
                                        <i class="fas ${s.icon}" style="font-size:48px; color:${primary}; margin-bottom:16px;"></i>
                                        <h3>${s.name}</h3>
                                        <p style="color:#64748b;">${s.description}</p>
                                    </div>
                                `).join('')}
                            </div>
                        ` : ''}
                    </div>
                </div>
            `;
        }
        
        async function saveSite() {
            if (currentEditingSite) {
                await updateDoc(doc(db, 'sites', currentEditingSite.id), { updatedAt: new Date().toISOString() });
                showToast('Saved!', 'success');
            }
        }
        
        function closeEditor() {
            currentEditingSite = null;
            showPage('dashboardPage');
            loadDashboard();
        }
        
        function openCreateModal() {
            document.getElementById('createModal').classList.add('active');
        }
        
        function closeCreateModal() {
            document.getElementById('createModal').classList.remove('active');
            document.getElementById('siteTitle').value = '';
            document.getElementById('siteSlug').value = '';
        }
        
        async function createSite() {
            const title = document.getElementById('siteTitle').value;
            const slug = document.getElementById('siteSlug').value;
            const templateId = document.getElementById('selectedTemplate').value;
            
            if (!title || !slug) {
                showToast('Fill all fields', 'error');
                return;
            }
            
            try {
                await addDoc(collection(db, 'sites'), {
                    title, slug: slug.toLowerCase().replace(/[^a-z0-9]/g, ''),
                    template: templateId,
                    content: JSON.parse(JSON.stringify(templates[templateId].structure)),
                    userId: currentUser.uid,
                    createdAt: new Date().toISOString(),
                    published: true
                });
                showToast('Site created!', 'success');
                closeCreateModal();
                loadDashboard();
            } catch (error) {
                showToast(error.message, 'error');
            }
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
        }
        
        async function viewPublicSite(slug) {
            try {
                const q = query(collection(db, 'sites'), where('slug', '==', slug), where('published', '==', true));
                const snapshot = await getDocs(q);
                if (snapshot.empty) {
                    document.getElementById('app').innerHTML = `<div style="min-height:100vh; display:flex; align-items:center; justify-content:center;"><h2>Site not found</h2></div>`;
                    return;
                }
                const site = snapshot.docs[0].data();
                document.getElementById('app').innerHTML = renderSitePreview({ content: site.content });
                document.getElementById('app').innerHTML += `<footer style="text-align:center; padding:20px;">Created with WebCraft Pro</footer>`;
            } catch (error) {
                document.getElementById('app').innerHTML = `<div>Error: ${error.message}</div>`;
            }
        }
        
        renderApp();
        
        const slug = window.location.pathname.substring(1);
        if (slug && slug !== '') {
            viewPublicSite(slug);
        } else {
            onAuthStateChanged(auth, (user) => {
                currentUser = user;
                if (user) {
                    showPage('dashboardPage');
                    loadDashboard();
                } else {
                    showPage('landingPage');
                }
            });
        }
    </script>
</body>
</html>
