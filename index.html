                                <li><a id="dashboardLink" class="active"><i class="fas fa-th-large"></i> Meus Sites</a></li>
                                <li><a id="createSiteLink"><i class="fas fa-plus-circle"></i> Criar Site</a></li>
                                <li><a><i class="fas fa-chart-line"></i> Analytics</a></li>
                                <li><a><i class="fas fa-credit-card"></i> Planos</a></li>
                            </ul>
                            <div class="sidebar-footer">
                                <div class="user-info" style="display:flex; align-items:center; gap:12px; margin-bottom:16px;">
                                    <i class="fas fa-user-circle" style="font-size:32px; color:#667eea;"></i>
                                    <div>
                                        <div style="font-weight:600;" id="userName"></div>
                                        <div style="font-size:12px; color:#64748b;">Plano Grátis</div>
                                    </div>
                                </div>
                                <button id="logoutBtn" class="btn-outline" style="width:100%;"><i class="fas fa-sign-out-alt"></i> Sair</button>
                            </div>
                        </aside>
                        <main class="main-content">
                            <div class="dashboard-header">
                                <h1><i class="fas fa-th-large"></i> Meus Sites</h1>
                                <button id="createSiteBtn" class="btn-primary"><i class="fas fa-plus"></i> Novo Site</button>
                            </div>
                            <div id="sitesGrid"></div>
                        </main>
                    </div>
                </div>
                
                <div id="editorPage" class="page">
                    <div class="editor-layout">
                        <div class="editor-sidebar">
                            <h3 id="editorTitle" style="margin-bottom:24px;"></h3>
                            <div id="editorFields"></div>
                            <button id="saveSiteBtn" class="btn-primary" style="margin-top:20px;"><i class="fas fa-save"></i> Salvar Alterações</button>
                            <button id="closeEditorBtn" class="btn-outline" style="margin-top:10px; width:100%;"><i class="fas fa-arrow-left"></i> Voltar</button>
                        </div>
                        <div class="editor-preview">
                            <h3 style="margin-bottom:20px;"><i class="fas fa-mobile-alt"></i> Pré-visualização ao vivo</h3>
                            <div id="livePreview"></div>
                        </div>
                    </div>
                </div>
                
                <div id="createModal" class="modal">
                    <div class="modal-content">
                        <h2 style="margin-bottom:24px;"><i class="fas fa-magic"></i> Criar novo site</h2>
                        <div class="input-group">
                            <label><i class="fas fa-tag"></i> Nome do site</label>
                            <input type="text" id="siteTitle" placeholder="Ex: Meu Portfólio">
                        </div>
                        <div class="input-group">
                            <label><i class="fas fa-link"></i> Endereço único (slug)</label>
                            <input type="text" id="siteSlug" placeholder="meusite">
                            <small style="color:#64748b;">🔗 Seu site estará em: <strong id="slugPreview" style="color:#667eea;">meusite</strong>.webcraft.app</small>
                        </div>
                        <div class="input-group">
                            <label><i class="fas fa-palette"></i> Escolha um template</label>
                            <input type="hidden" id="selectedTemplate" value="modern">
                            ${Object.entries(templates).map(([id, t]) => `
                                <div class="template-card" data-template="${id}">
                                    <div style="display:flex; align-items:center; gap:12px;">
                                        <i class="fas ${t.icon}" style="font-size:24px; color:#667eea;"></i>
                                        <div style="flex:1;">
                                            <h3 style="margin-bottom:4px;">${t.name}</h3>
                                            <p style="color:#64748b; font-size:13px;">${t.description}</p>
                                        </div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                        <button id="confirmCreateBtn" class="btn-primary"><i class="fas fa-rocket"></i> Criar Site</button>
                        <button id="cancelCreateBtn" class="btn-outline" style="margin-top:10px;">Cancelar</button>
                    </div>
                </div>
                
                <div id="toast" class="toast"></div>
            `;
            attachEvents();
        }
        
        function attachEvents() {
            document.getElementById('loginForm')?.addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('loginEmail').value;
                const password = document.getElementById('loginPassword').value;
                try {
                    await signInWithEmailAndPassword(auth, email, password);
                    showToast('Login realizado com sucesso!', 'success');
                } catch (error) {
                    showToast(error.message, 'error');
                }
            });
            
            document.getElementById('registerForm')?.addEventListener('submit', async (e) => {
                e.preventDefault();
                const name = document.getElementById('registerName').value;
                const email = document.getElementById('registerEmail').value;
                const password = document.getElementById('registerPassword').value;
                try {
                    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                    await updateProfile(userCredential.user, { displayName: name });
                    showToast('Conta criada com sucesso!', 'success');
                } catch (error) {
                    showToast(error.message, 'error');
                }
            });
            
            document.getElementById('showRegisterBtn')?.addEventListener('click', () => showPage('registerPage'));
            document.getElementById('showLoginBtn')?.addEventListener('click', () => showPage('loginPage'));
            document.getElementById('createSiteBtn')?.addEventListener('click', () => openCreateModal());
            document.getElementById('createSiteLink')?.addEventListener('click', () => openCreateModal());
            document.getElementById('confirmCreateBtn')?.addEventListener('click', () => createSite());
            document.getElementById('cancelCreateBtn')?.addEventListener('click', () => closeCreateModal());
            document.getElementById('saveSiteBtn')?.addEventListener('click', () => saveSite());
            document.getElementById('closeEditorBtn')?.addEventListener('click', () => closeEditor());
            document.getElementById('logoutBtn')?.addEventListener('click', async () => {
                await signOut(auth);
                showToast('Logout realizado', 'success');
            });
            
            document.querySelectorAll('.template-card').forEach(card => {
                card.addEventListener('click', () => {
                    document.querySelectorAll('.template-card').forEach(c => c.classList.remove('selected'));
                    card.classList.add('selected');
                    document.getElementById('selectedTemplate').value = card.dataset.template;
                });
            });
            
            document.getElementById('siteSlug')?.addEventListener('input', (e) => {
                const preview = document.getElementById('slugPreview');
                if (preview) preview.textContent = e.target.value || 'meusite';
            });
        }
        
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }
        
        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        async function loadDashboard() {
            if (!currentUser) return;
            
            const sitesGrid = document.getElementById('sitesGrid');
            sitesGrid.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i> Carregando seus sites...</div>';
            
            try {
                const q = query(collection(db, 'sites'), where('userId', '==', currentUser.uid));
                const snapshot = await getDocs(q);
                
                document.getElementById('userName').innerHTML = currentUser.displayName || currentUser.email;
                
                if (snapshot.empty) {
                    sitesGrid.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-crown"></i>
                            <h3>✨ Crie seu primeiro site profissional</h3>
                            <p style="color:#64748b; margin-bottom:24px;">Escolha entre 5 templates exclusivos e comece agora</p>
                            <button class="btn-primary" id="emptyCreateBtn"><i class="fas fa-plus"></i> Criar meu primeiro site</button>
                        </div>
                    `;
                    document.getElementById('emptyCreateBtn')?.addEventListener('click', () => openCreateModal());
                    return;
                }
                
                sitesGrid.innerHTML = '';
                snapshot.forEach(doc => {
                    const site = doc.data();
                    sitesGrid.innerHTML += `
                        <div class="site-card">
                            <div class="site-card-header">
                                <div class="site-icon"><i class="fas ${templates[site.template]?.icon || 'fa-globe'}"></i></div>
                                <div class="site-info">
                                    <h3>${escapeHtml(site.title)}</h3>
                                    <p><i class="fas fa-link"></i> /${site.slug}</p>
                                    <span class="badge">${templates[site.template]?.name || 'Template'}</span>
                                </div>
                            </div>
                            <div class="site-card-actions">
                                <button class="btn-outline" onclick="window.editSiteById('${doc.id}')"><i class="fas fa-edit"></i> Editar</button>
                                <button class="btn-outline" onclick="window.open('/${site.slug}', '_blank')"><i class="fas fa-eye"></i> Ver</button>
                                <button class="btn-danger" onclick="window.deleteSiteById('${doc.id}')"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                sitesGrid.innerHTML = `<div class="empty-state">Erro: ${error.message}</div>`;
            }
        }
        
        window.editSiteById = async (siteId) => {
            const q = query(collection(db, 'sites'), where('userId', '==', currentUser.uid));
            const snapshot = await getDocs(q);
            snapshot.forEach(doc => {
                if (doc.id === siteId) {
                    currentEditingSite = { id: doc.id, ...doc.data() };
                    showEditor();
                }
            });
        };
        
        window.deleteSiteById = async (siteId) => {
            if (!confirm('⚠️ Tem certeza? Esta ação é irreversível.')) return;
            await deleteDoc(doc(db, 'sites', siteId));
            showToast('Site excluído com sucesso', 'success');
            loadDashboard();
        };
        
        function showEditor() {
            showPage('editorPage');
            document.getElementById('editorTitle').innerHTML = `<i class="fas fa-edit"></i> Editando: ${currentEditingSite.title}`;
            
            let html = '';
            
            // Seção de Informações Básicas
            html += `<div class="editor-section"><h4><i class="fas fa-info-circle"></i> Informações Básicas</h4>`;
            for (let [key, value] of Object.entries(currentEditingSite.content)) {
                if (typeof value === 'string' && !key.includes('Color') && key !== 'heroImage' && key !== 'avatar') {
                    html += `
                        <div class="editor-field">
                            <label>📝 ${key.replace(/([A-Z])/g, ' $1').replace(/^./, str => str.toUpperCase())}</label>
                            <input type="text" id="field_${key}" value="${escapeHtml(value)}">
                        </div>
                    `;
                }
            }
            html += `</div>`;
            
            // Seção de Cores
            html += `<div class="editor-section"><h4><i class="fas fa-palette"></i> Cores do Site</h4>`;
            for (let [key, value] of Object.entries(currentEditingSite.content)) {
                if (typeof value === 'string' && key.includes('Color')) {
                    html += `
                        <div class="editor-field">
                            <label>🎨 ${key.replace(/([A-Z])/g, ' $1').replace(/^./, str => str.toUpperCase())}</label>
                            <div class="color-input-group">
                                <input type="color" id="field_${key}" value="${value}">
                                <input type="text" value="${value}" style="flex:1;" onchange="document.getElementById('field_${key}').value = this.value; document.getElementById('field_${key}').dispatchEvent(new Event('change'))">
                            </div>
                        </div>
                    `;
                }
            }
            html += `</div>`;
            
            // Seção de Contato e WhatsApp
            html += `<div class="editor-section"><h4><i class="fab fa-whatsapp"></i> Contato & WhatsApp</h4>`;
            const contactFields = ['showWhatsapp', 'whatsappNumber', 'whatsappMessage', 'showEmail', 'emailAddress', 'showPhone', 'phoneNumber', 'showAddress', 'address'];
            for (let key of contactFields) {
                if (currentEditingSite.content.hasOwnProperty(key)) {
                    const value = currentEditingSite.content[key];
                    if (typeof value === 'boolean') {
                        html += `
                            <div class="editor-field">
                                <label><input type="checkbox" id="field_${key}" ${value ? 'checked' : ''}> ${key.replace(/([A-Z])/g, ' $1').replace(/^./, str => str.toUpperCase())}</label>
                            </div>
                        `;
                    } else if (typeof value === 'string') {
                        html += `
                            <div class="editor-field">
                                <label>📞 ${key.replace(/([A-Z])/g, ' $1').replace(/^./, str => str.toUpperCase())}</label>
                                <input type="text" id="field_${key}" value="${escapeHtml(value)}">
                            </div>
                        `;
                    }
                }
            }
            html += `</div>`;
            
            document.getElementById('editorFields').innerHTML = html;
            
            // Attach event listeners
            for (let [key, value] of Object.entries(currentEditingSite.content)) {
                const field = document.getElementById(`field_${key}`);
                if (field) {
                    if (field.type === 'checkbox') {
                        field.addEventListener('change', async (e) => {
                            currentEditingSite.content[key] = e.target.checked;
                            await updateDoc(doc(db, 'sites', currentEditingSite.id), { content: currentEditingSite.content });
                            updatePreview();
                        });
                    } else {
                        field.addEventListener('change', async (e) => {
                            currentEditingSite.content[key] = e.target.value;
                            await updateDoc(doc(db, 'sites', currentEditingSite.id), { content: currentEditingSite.content });
                            updatePreview();
                        });
                    }
                }
            }
            
            updatePreview();
        }
        
        function updatePreview() {
            const preview = document.getElementById('livePreview');
            if (preview && currentEditingSite) {
                preview.innerHTML = renderSitePreview(currentEditingSite);
            }
        }
        
        function renderSitePreview(site) {
            const c = site.content;
            const t = site.template;
            
            const fontFamily = c.fontFamily === 'Playfair Display' ? "'Playfair Display', serif" : c.fontFamily === 'Poppins' ? "'Poppins', sans-serif" : "'Inter', sans-serif";
            
            if (t === 'modern') {
                return `
                    <div style="font-family:${fontFamily};">
                        <div style="height:70vh; background:linear-gradient(135deg, ${c.primaryColor || '#6366f1'}, ${c.secondaryColor || '#8b5cf6'}); display:flex; align-items:center; justify-content:center; text-align:center; color:white; position:relative;">
                            <div style="position:relative; z-index:2; max-width:800px; padding:20px;">
                                <h1 style="font-size:72px; margin-bottom:20px; font-weight:800;">${c.heroTitle || 'Creative Studio'}</h1>
                                <p style="font-size:24px; opacity:0.95;">${c.heroSubtitle || 'Transformando ideias em realidade'}</p>
                                <div style="margin-top:40px; display:flex; gap:16px; justify-content:center;">
                                    ${c.showWhatsapp ? `<a href="https://wa.me/${c.whatsappNumber}?text=${encodeURIComponent(c.whatsappMessage || 'Olá!')}" style="padding:14px 32px; background:white; border-radius:50px; text-decoration:none; color:${c.primaryColor}; font-weight:600;">📱 WhatsApp</a>` : ''}
                                    ${c.showEmail ? `<a href="mailto:${c.emailAddress}" style="padding:14px 32px; background:rgba(255,255,255,0.2); border-radius:50px; text-decoration:none; color:white; font-weight:600;">✉️ Email</a>` : ''}
                                </div>
                            </div>
                        </div>
                        <div style="max-width:1200px; margin:0 auto; padding:80px 20px;">
                            <div style="text-align:center; margin-bottom:60px;">
                                <h2 style="font-size:42px; margin-bottom:20px;">${c.aboutTitle || 'Sobre Nós'}</h2>
                                <p style="font-size:18px; color:#475569; max-width:700px; margin:0 auto;">${c.aboutText || 'Somos uma agência criativa focada em entregar soluções inovadoras.'}</p>
                            </div>
                            <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(300px,1fr)); gap:30px;">
                                ${c.services?.map(s => `
                                    <div style="text-align:center; padding:40px 30px; background:white; border-radius:24px; box-shadow:0 4px 6px rgba(0,0,0,0.05); transition:transform 0.3s;">
                                        <i class="fas ${s.icon || 'fa-star'}" style="font-size:56px; color:${c.primaryColor || '#6366f1'}; margin-bottom:20px;"></i>
                                        <h3 style="margin-bottom:10px; font-size:22px;">${s.name}</h3>
                                        <p style="color:#64748b;">${s.description || ''}</p>
                                        ${s.price ? `<div style="margin-top:16px; font-weight:600; color:${c.primaryColor};">${s.price}</div>` : ''}
                                    </div>
                                `).join('') || ''}
                            </div>
                        </div>
                    </div>
                `;
            } else if (t === 'restaurant') {
                return `
                    <div style="font-family:${fontFamily};">
                        <div style="height:60vh; background:linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('${c.heroImage || 'https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=1600'}'); background-size:cover; background-position:center; display:flex; align-items:center; justify-content:center; text-align:center; color:white;">
                            <div>
                                <h1 style="font-size:64px; margin-bottom:16px;">${c.restaurantName || 'Gourmet Bistrô'}</h1>
                                <p style="font-size:20px;">${c.tagline || 'Sabores que encantam'}</p>
                                ${c.showWhatsapp ? `<a href="https://wa.me/${c.whatsappNumber}?text=${encodeURIComponent(c.whatsappMessage || 'Olá! Gostaria de fazer uma reserva')}" style="display:inline-block; margin-top:30px; padding:14px 32px; background:${c.primaryColor || '#dc2626'}; border-radius:50px; text-decoration:none; color:white;">📱 Reservar pelo WhatsApp</a>` : ''}
                            </div>
                        </div>
                        <div style="max-width:1200px; margin:0 auto; padding:60px 20px;">
                            <p style="text-align:center; font-size:18px; margin-bottom:60px;">${c.description || 'Culinária refinada com ingredientes selecionados'}</p>
                            <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(250px,1fr)); gap:30px; margin-bottom:60px;">
                                <div><h3>📍 Endereço</h3><p>${c.address || 'Rua dos Sabores, 123'}</p></div>
                                <div><h3>📞 Telefone</h3><p>${c.phoneNumber || '+55 11 3333-3333'}</p></div>
                                <div><h3>⏰ Horário</h3><p>${c.businessHours || 'Terça a Domingo: 19h às 23h'}</p></div>
                            </div>
                        </div>
                    </div>
                `;
            } else {
                return `
                    <div style="font-family:${fontFamily};">
                        <div style="height:60vh; background:linear-gradient(135deg, ${c.primaryColor || '#667eea'}, ${c.secondaryColor || '#764ba2'}); display:flex; align-items:center; justify-content:center; text-align:center; color:white;">
                            <div>
                                <h1 style="font-size:64px;">${c.companyName || c.name || 'Meu Site'}</h1>
                                <p style="font-size:20px;">${c.tagline || c.title || 'Bem-vindo'}</p>
                            </div>
                        </div>
                        <div style="max-width:1000px; margin:0 auto; padding:60px 20px; text-align:center;">
                            <p style="font-size:18px;">${c.description || c.bio || 'Conteúdo do seu site'}</p>
                            ${c.showWhatsapp ? `<a href="https://wa.me/${c.whatsappNumber}" style="display:inline-block; margin-top:30px; padding:12px 32px; background:${c.primaryColor || '#25D366'}; border-radius:50px; text-decoration:none; color:white;"><i class="fab fa-whatsapp"></i> WhatsApp</a>` : ''}
                        </div>
                    </div>
                `;
            }
        }
        
        async function saveSite() {
            if (currentEditingSite) {
                await updateDoc(doc(db, 'sites', currentEditingSite.id), { content: currentEditingSite.content });
                showToast('✅ Site salvo com sucesso!', 'success');
                closeEditor();
                loadDashboard();
            }
        }
        
        function closeEditor() {
            currentEditingSite = null;
            showPage('dashboardPage');
            loadDashboard();
        }
        
        function openCreateModal() {
            document.getElementById('createModal').classList.add('active');
            document.querySelector('.template-card')?.classList.add('selected');
        }
        
        function closeCreateModal() {
            document.getElementById('createModal').classList.remove('active');
            document.getElementById('siteTitle').value = '';
            document.getElementById('siteSlug').value = '';
        }
        
        async function createSite() {
            const title = document.getElementById('siteTitle').value;
            const slug = document.getElementById('siteSlug').value;
            const templateId = document.getElementById('selectedTemplate').value;
            
            if (!title || !slug) {
                showToast('Preencha todos os campos', 'error');
                return;
            }
            
            try {
                const siteData = {
                    title: title,
                    slug: slug.toLowerCase().replace(/[^a-z0-9]/g, ''),
                    template: templateId,
                    content: JSON.parse(JSON.stringify(templates[templateId].structure)),
                    userId: currentUser.uid,
                    createdAt: new Date().toISOString(),
                    published: true
                };
                
                await addDoc(collection(db, 'sites'), siteData);
                showToast('✨ Site criado com sucesso!', 'success');
                closeCreateModal();
                loadDashboard();
            } catch (error) {
                showToast('Erro: ' + error.message, 'error');
            }
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        async function viewPublicSite(slug) {
            try {
                const q = query(collection(db, 'sites'), where('slug', '==', slug), where('published', '==', true));
                const snapshot = await getDocs(q);
                
                if (snapshot.empty) {
                    document.getElementById('app').innerHTML = `
                        <div style="min-height:100vh; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:20px;">
                            <i class="fas fa-search" style="font-size:64px; color:#cbd5e0;"></i>
                            <h2>🔍 Site não encontrado</h2>
                            <a href="/" style="color:#667eea;">← Voltar para WebCraft Pro</a>
                        </div>
                    `;
                    return;
                }
                
                const site = snapshot.docs[0].data();
                document.getElementById('app').innerHTML = renderSitePreview(site);
                document.getElementById('app').innerHTML += `<footer style="text-align:center; padding:24px; background:#f8fafc; color:#94a3b8; font-size:14px;">✨ Criado com <i class="fas fa-heart" style="color:#ef4444;"></i> WebCraft Pro</footer>`;
            } catch (error) {
                document.getElementById('app').innerHTML = `<div style="padding:40px;">Erro: ${error.message}</div>`;
            }
        }
        
        renderApp();
        
        const slug = window.location.pathname.substring(1);
        if (slug && slug !== '') {
            viewPublicSite(slug);
        } else {
            onAuthStateChanged(auth, (user) => {
                currentUser = user;
                if (user) {
                    showPage('dashboardPage');
                    loadDashboard();
                } else {
                    showPage('loginPage');
                }
            });
        }
    </script>
</body>
</html>
