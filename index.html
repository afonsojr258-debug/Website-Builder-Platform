<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebCraft | Websites Profissionais</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- AOS Animation -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #ffffff;
            color: #1a1a2e;
        }
        
        /* Pages */
        .page {
            display: none;
        }
        
        .page.active {
            display: block;
        }
        
        /* Auth Pages */
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        
        .auth-container {
            background: white;
            border-radius: 24px;
            padding: 48px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .auth-header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .auth-header .logo {
            font-size: 48px;
            margin-bottom: 16px;
        }
        
        .auth-header h1 {
            font-size: 32px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #4a5568;
        }
        
        .input-group input, .input-group select, .input-group textarea {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        .input-group input:focus, .input-group select:focus, .input-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102,126,234,0.3);
        }
        
        .btn-secondary {
            padding: 10px 20px;
            background: #e2e8f0;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 500;
        }
        
        .auth-switch {
            text-align: center;
            margin-top: 24px;
            color: #718096;
        }
        
        .auth-switch a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }
        
        /* Dashboard */
        .dashboard-layout {
            display: flex;
            min-height: 100vh;
        }
        
        .sidebar {
            width: 280px;
            background: white;
            border-right: 1px solid #e2e8f0;
            padding: 32px 24px;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }
        
        .sidebar-logo {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .sidebar-menu {
            list-style: none;
        }
        
        .sidebar-menu li {
            margin-bottom: 12px;
        }
        
        .sidebar-menu a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: #4a5568;
            text-decoration: none;
            border-radius: 12px;
            transition: all 0.2s;
            cursor: pointer;
        }
        
        .sidebar-menu a:hover, .sidebar-menu a.active {
            background: #f7fafc;
            color: #667eea;
        }
        
        .sidebar-footer {
            position: absolute;
            bottom: 32px;
            left: 24px;
            right: 24px;
            padding-top: 24px;
            border-top: 1px solid #e2e8f0;
        }
        
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 32px 48px;
        }
        
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }
        
        .sites-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }
        
        .site-card {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 20px;
            transition: all 0.3s;
        }
        
        .site-card:hover {
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transform: translateY(-4px);
        }
        
        .site-card-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
        }
        
        .site-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
        }
        
        .site-info h3 {
            font-size: 18px;
            margin-bottom: 4px;
        }
        
        .site-info p {
            color: #718096;
            font-size: 13px;
        }
        
        .site-card-actions {
            display: flex;
            gap: 12px;
        }
        
        .btn-outline {
            padding: 8px 16px;
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }
        
        .btn-outline:hover {
            border-color: #667eea;
            color: #667eea;
        }
        
        .btn-danger {
            padding: 8px 12px;
            background: #fed7d7;
            border: none;
            border-radius: 8px;
            color: #c53030;
            cursor: pointer;
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            border-radius: 24px;
            padding: 32px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        /* Editor */
        .editor-layout {
            display: flex;
            height: 100vh;
        }
        
        .editor-sidebar {
            width: 400px;
            background: white;
            border-right: 1px solid #e2e8f0;
            padding: 24px;
            overflow-y: auto;
        }
        
        .editor-preview {
            flex: 1;
            background: #f5f7fa;
            overflow-y: auto;
            padding: 24px;
        }
        
        .editor-field {
            margin-bottom: 24px;
        }
        
        .editor-field label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #4a5568;
        }
        
        .editor-field input, .editor-field textarea, .editor-field select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 14px;
        }
        
        .color-preview {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            margin-top: 8px;
            border: 2px solid #e2e8f0;
        }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 12px 24px;
            border-radius: 12px;
            color: white;
            transform: translateX(400px);
            transition: transform 0.3s;
            z-index: 2000;
        }
        
        .toast.show {
            transform: translateX(0);
        }
        
        .toast.success { background: #48bb78; }
        .toast.error { background: #f56565; }
        
        .loading {
            text-align: center;
            padding: 40px;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }
        
        .empty-state i {
            font-size: 64px;
            color: #cbd5e0;
            margin-bottom: 20px;
        }
        
        .template-card {
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .template-card:hover, .template-card.selected {
            border-color: #667eea;
            background: #f7fafc;
            transform: translateX(4px);
        }
        
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                position: fixed;
                z-index: 100;
            }
            .main-content {
                margin-left: 0;
                padding: 20px;
            }
            .editor-layout {
                flex-direction: column;
            }
            .editor-sidebar {
                width: 100%;
                max-height: 50vh;
            }
        }
    </style>
</head>
<body>

                        { title: 'YouTube', url: '#', icon: 'fa-youtube' }
                    ]
                }

        function renderApp() {
            const appDiv = document.getElementById('app');
            appDiv.innerHTML = `
                <div id="loginPage" class="page">
                    <div class="auth-page">
                        <div class="auth-container">
                            <div class="auth-header">
                                <div class="logo"><i class="fas fa-rocket"></i></div>
                                <h1>WebCraft</h1>
                                <p>Crie websites profissionais em minutos</p>
                            </div>
                            <form id="loginForm">
                                <div class="input-group">
                                    <label>Email</label>
                                    <input type="email" id="loginEmail" required>
                                </div>
                                <div class="input-group">
                                    <label>Senha</label>
                                    <input type="password" id="loginPassword" required>
                                </div>
                                <button type="submit" class="btn-primary">Entrar</button>
                            </form>
                            <p class="auth-switch">Não tem conta? <a id="showRegisterBtn">Criar conta gratuita</a></p>
                        </div>
                    </div>
                </div>
                
                <div id="registerPage" class="page">
                    <div class="auth-page">
                        <div class="auth-container">
                            <div class="auth-header">
                                <div class="logo"><i class="fas fa-rocket"></i></div>
                                <h1>Criar Conta</h1>
                                <p>Comece gratuitamente</p>
                            </div>
                            <form id="registerForm">
                                <div class="input-group">
                                    <label>Nome</label>
                                    <input type="text" id="registerName" required>
                                </div>
                                <div class="input-group">
                                    <label>Email</label>
                                    <input type="email" id="registerEmail" required>
                                </div>
                                <div class="input-group">
                                    <label>Senha</label>
                                    <input type="password" id="registerPassword" required>
                                </div>
                                <button type="submit" class="btn-primary">Criar Conta</button>
                            </form>
                            <p class="auth-switch">Já tem conta? <a id="showLoginBtn">Fazer login</a></p>
                        </div>
                    </div>
                </div>
                
                <div id="dashboardPage" class="page">
                    <div class="dashboard-layout">
                        <aside class="sidebar">
                            <div class="sidebar-logo"><i class="fas fa-rocket"></i> WebCraft</div>
                            <ul class="sidebar-menu">
                                <li><a id="dashboardLink"><i class="fas fa-th-large"></i> Meus Sites</a></li>
                                <li><a id="createSiteLink"><i class="fas fa-plus-circle"></i> Criar Site</a></li>
                            </ul>
                            <div class="sidebar-footer">
                                <div class="user-info"><i class="fas fa-user-circle"></i> <span id="userName"></span></div>
                                <button id="logoutBtn" class="btn-outline" style="width:100%; margin-top:16px;">Sair</button>
                            </div>
                        </aside>
                        <main class="main-content">
                            <div class="dashboard-header">
                                <h1>Meus Sites</h1>
                                <button id="createSiteBtn" class="btn-primary">+ Criar Site</button>
                            </div>
                            <div id="sitesGrid"></div>
                        </main>
                    </div>
                </div>
                
                <div id="editorPage" class="page">
                    <div class="editor-layout">
                        <div class="editor-sidebar">
                            <h3 id="editorTitle"></h3>
                            <div id="editorFields"></div>
                            <button id="saveSiteBtn" class="btn-primary" style="margin-top:20px;">💾 Salvar Alterações</button>
                            <button id="closeEditorBtn" class="btn-outline" style="margin-top:10px; width:100%;">← Voltar</button>
                        </div>
                        <div class="editor-preview">
                            <h3 style="margin-bottom:20px;">📱 Pré-visualização ao vivo</h3>
                            <div id="livePreview"></div>
                        </div>
                    </div>
                </div>
                
                <div id="createModal" class="modal">
                    <div class="modal-content">
                        <h2 style="margin-bottom:24px;">✨ Criar novo site</h2>
                        <div class="input-group">
                            <label>Nome do site</label>
                            <input type="text" id="siteTitle" placeholder="Ex: Meu Portfólio">
                        </div>
                        <div class="input-group">
                            <label>Endereço (slug)</label>
                            <input type="text" id="siteSlug" placeholder="meusite">
                            <small>🔗 Seu site estará em: /<span id="slugPreview">meusite</span></small>
                        </div>
                        <div class="input-group">
                            <label>🎨 Escolha um template</label>
                            <input type="hidden" id="selectedTemplate" value="modern">
                            ${Object.entries(templates).map(([id, t]) => `
                                <div class="template-card" data-template="${id}">
                                    <h3><i class="fas ${t.icon}"></i> ${t.name}</h3>
                                    <p style="color:#718096; font-size:14px;">${t.description}</p>
                                </div>
                            `).join('')}
                        </div>
                        <button id="confirmCreateBtn" class="btn-primary">🚀 Criar Site</button>
                        <button id="cancelCreateBtn" class="btn-outline" style="margin-top:10px;">Cancelar</button>
                    </div>
                </div>
                
                <div id="toast" class="toast"></div>
            `;
            attachEvents();
        }
        
        function attachEvents() {
            document.getElementById('loginForm')?.addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('loginEmail').value;
                const password = document.getElementById('loginPassword').value;
                try {
                    await signInWithEmailAndPassword(auth, email, password);
                    showToast('Login realizado!', 'success');
                } catch (error) {
                    showToast(error.message, 'error');
                }
            });
            
            document.getElementById('registerForm')?.addEventListener('submit', async (e) => {
                e.preventDefault();
                const name = document.getElementById('registerName').value;
                const email = document.getElementById('registerEmail').value;
                const password = document.getElementById('registerPassword').value;
                try {
                    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                    await updateProfile(userCredential.user, { displayName: name });
                    showToast('Conta criada!', 'success');
                } catch (error) {
                    showToast(error.message, 'error');
                }
            });
            
            document.getElementById('showRegisterBtn')?.addEventListener('click', () => showPage('registerPage'));
            document.getElementById('showLoginBtn')?.addEventListener('click', () => showPage('loginPage'));
            document.getElementById('createSiteBtn')?.addEventListener('click', () => openCreateModal());
            document.getElementById('createSiteLink')?.addEventListener('click', () => openCreateModal());
            document.getElementById('confirmCreateBtn')?.addEventListener('click', () => createSite());
            document.getElementById('cancelCreateBtn')?.addEventListener('click', () => closeCreateModal());
            document.getElementById('saveSiteBtn')?.addEventListener('click', () => saveSite());
            document.getElementById('closeEditorBtn')?.addEventListener('click', () => closeEditor());
            document.getElementById('logoutBtn')?.addEventListener('click', async () => {
                await signOut(auth);
                showToast('Logout realizado', 'success');
            });
            
            document.querySelectorAll('.template-card').forEach(card => {
                card.addEventListener('click', () => {
                    document.querySelectorAll('.template-card').forEach(c => c.classList.remove('selected'));
                    card.classList.add('selected');
                    document.getElementById('selectedTemplate').value = card.dataset.template;
                });
            });
            
            document.getElementById('siteSlug')?.addEventListener('input', (e) => {
                const preview = document.getElementById('slugPreview');
                if (preview) preview.textContent = e.target.value || 'meusite';
            });
        }
        
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }
        
        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        async function loadDashboard() {
            if (!currentUser) return;
            
            const sitesGrid = document.getElementById('sitesGrid');
            sitesGrid.innerHTML = '<div class="loading">📂 Carregando seus sites...</div>';
            
            try {
                const q = query(collection(db, 'sites'), where('userId', '==', currentUser.uid));
                const snapshot = await getDocs(q);
                
                document.getElementById('userName').textContent = currentUser.displayName || currentUser.email;
                
                if (snapshot.empty) {
                    sitesGrid.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-rocket"></i>
                            <h3>✨ Crie seu primeiro site</h3>
                            <p>Escolha um template profissional e comece agora</p>
                            <button class="btn-primary" id="emptyCreateBtn">🚀 Criar meu primeiro site</button>
                        </div>
                    `;
                    document.getElementById('emptyCreateBtn')?.addEventListener('click', () => openCreateModal());
                    return;
                }
                
                sitesGrid.innerHTML = '';
                snapshot.forEach(doc => {
                    const site = doc.data();
                    sitesGrid.innerHTML += `
                        <div class="site-card">
                            <div class="site-card-header">
                                <div class="site-icon"><i class="fas ${templates[site.template]?.icon || 'fa-globe'}"></i></div>
                                <div class="site-info">
                                    <h3>${escapeHtml(site.title)}</h3>
                                    <p>🔗 /${site.slug}</p>
                                </div>
                            </div>
                            <div class="site-card-actions">
                                <button class="btn-outline" onclick="window.editSiteById('${doc.id}')">✏️ Editar</button>
                                <button class="btn-outline" onclick="window.open('/${site.slug}', '_blank')">👁️ Ver</button>
                                <button class="btn-danger" onclick="window.deleteSiteById('${doc.id}')">🗑️ Excluir</button>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                sitesGrid.innerHTML = `<div class="empty-state">Erro: ${error.message}</div>`;
            }
        }
        
        window.editSiteById = async (siteId) => {
            const q = query(collection(db, 'sites'), where('userId', '==', currentUser.uid));
            const snapshot = await getDocs(q);
            snapshot.forEach(doc => {
                if (doc.id === siteId) {
                    currentEditingSite = { id: doc.id, ...doc.data() };
                    showEditor();
                }
            });
        };
        
        window.deleteSiteById = async (siteId) => {
            if (!confirm('⚠️ Tem certeza? Esta ação é irreversível.')) return;
            await deleteDoc(doc(db, 'sites', siteId));
            showToast('Site excluído', 'success');
            loadDashboard();
        };
        
        function showEditor() {
            showPage('editorPage');
            document.getElementById('editorTitle').innerHTML = `<i class="fas fa-edit"></i> Editando: ${currentEditingSite.title}`;
            
            let html = '';
            for (let [key, value] of Object.entries(currentEditingSite.content)) {
                if (typeof value === 'string') {
                    if (key.includes('Color')) {
                        html += `
                            <div class="editor-field">
                                <label>🎨 ${key}</label>
                                <input type="color" id="field_${key}" value="${value}">
                                <div class="color-preview" style="background:${value}"></div>
                            </div>
                        `;
                    } else {
                        html += `
                            <div class="editor-field">
                                <label>📝 ${key}</label>
                                <input type="text" id="field_${key}" value="${escapeHtml(value)}">
                            </div>
                        `;
                    }
                }
            }
            
            document.getElementById('editorFields').innerHTML = html;
            
            for (let [key, value] of Object.entries(currentEditingSite.content)) {
                if (typeof value === 'string') {
                    document.getElementById(`field_${key}`)?.addEventListener('change', async (e) => {
                        currentEditingSite.content[key] = e.target.value;
                        await updateDoc(doc(db, 'sites', currentEditingSite.id), { content: currentEditingSite.content });
                        updatePreview();
                    });
                }
            }
            
            updatePreview();
        }
        
        function updatePreview() {
            const preview = document.getElementById('livePreview');
            if (preview && currentEditingSite) {
                preview.innerHTML = renderSitePreview(currentEditingSite);
            }
        }
        
        function renderSitePreview(site) {
            const c = site.content;
            const t = site.template;
            
            if (t === 'modern') {
                return `
                    <div style="font-family:'Inter',sans-serif;">
                        <div style="height:60vh; background:linear-gradient(135deg, ${c.primaryColor || '#667eea'}, ${c.secondaryColor || '#764ba2'}); display:flex; align-items:center; justify-content:center; text-align:center; color:white; position:relative; overflow:hidden;">
                            <div style="position:relative; z-index:2;">
                                <h1 style="font-size:64px; margin-bottom:20px; font-weight:800;">${c.heroTitle || 'Creative Studio'}</h1>
                                <p style="font-size:24px; opacity:0.9;">${c.heroSubtitle || 'Transformando ideias em realidade'}</p>
                                <button style="margin-top:30px; padding:12px 32px; background:white; border:none; border-radius:50px; font-weight:600; color:${c.primaryColor || '#667eea'}; cursor:pointer;">Saiba mais</button>
                            </div>
                        </div>
                        <div style="max-width:1200px; margin:0 auto; padding:80px 20px;">
                            <div style="text-align:center; margin-bottom:60px;">
                                <h2 style="font-size:36px; margin-bottom:20px;">${c.aboutTitle || 'Sobre Nós'}</h2>
                                <p style="font-size:18px; color:#4a5568; max-width:800px; margin:0 auto;">${c.aboutText || 'Somos uma agência criativa focada em entregar soluções inovadoras.'}</p>
                            </div>
                            <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(300px,1fr)); gap:30px;">
                                ${c.services?.map(s => `
                                    <div style="text-align:center; padding:30px; background:#f7fafc; border-radius:20px; transition:transform 0.3s;">
                                        <i class="fas ${s.icon || 'fa-star'}" style="font-size:48px; color:${c.primaryColor || '#667eea'}; margin-bottom:20px;"></i>
                                        <h3 style="margin-bottom:10px;">${s.name}</h3>
                                        <p style="color:#718096;">${s.description || ''}</p>
                                    </div>
                                `).join('') || ''}
                            </div>
                        </div>
                    </div>
                `;
            } else if (t === 'corporate') {
                return `
                    <div style="font-family:'Inter',sans-serif;">
                        <div style="height:50vh; background:linear-gradient(135deg, ${c.primaryColor || '#2563eb'}, ${c.secondaryColor || '#06b6d4'}); display:flex; align-items:center; justify-content:center; color:white; text-align:center;">
                            <div>
                                <h1 style="font-size:56px; margin-bottom:16px;">${c.companyName || 'Elite Corp'}</h1>
                                <p style="font-size:20px;">${c.tagline || 'Excelência em resultados'}</p>
                            </div>
                        </div>
                        <div style="max-width:1200px; margin:0 auto; padding:60px 20px;">
                            <p style="font-size:18px; text-align:center; margin-bottom:60px; color:#4a5568;">${c.description || 'Lideramos o mercado com soluções inovadoras.'}</p>
                            <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(250px,1fr)); gap:30px;">
                                ${c.services?.map(s => `
                                    <div style="padding:30px; border:1px solid #e2e8f0; border-radius:16px; text-align:center;">
                                        <i class="fas ${s.icon || 'fa-chart-line'}" style="font-size:40px; color:${c.primaryColor || '#2563eb'}; margin-bottom:16px;"></i>
                                        <h3>${s.name}</h3>
                                        <p style="color:#718096;">${s.description || ''}</p>
                                    </div>
                                `).join('') || ''}
                            </div>
                        </div>
                    </div>
                `;
            } else if (t === 'personal') {
                return `
                    <div style="font-family:'Inter',sans-serif;">
                        <div style="background:linear-gradient(135deg, ${c.primaryColor || '#ea580c'}, ${c.secondaryColor || '#dc2626'}); padding:60px 20px; text-align:center; color:white;">
                            <img src="${c.avatar || 'https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=200'}" style="width:150px; height:150px; border-radius:50%; object-fit:cover; margin-bottom:20px; border:4px solid white;">
                            <h1 style="font-size:48px;">${c.name || 'Ana Silva'}</h1>
                            <p style="font-size:20px;">${c.title || 'Designer & Diretora Criativa'}</p>
                        </div>
                        <div style="max-width:1000px; margin:0 auto; padding:60px 20px;">
                            <p style="font-size:18px; text-align:center; margin-bottom:60px;">${c.bio || 'Especialista em criar experiências digitais memoráveis.'}</p>
                            <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(300px,1fr)); gap:30px;">
                                ${c.projects?.map(p => `
                                    <div style="border-radius:16px; overflow:hidden; box-shadow:0 4px 6px rgba(0,0,0,0.1);">
                                        <img src="${p.image || 'https://images.unsplash.com/photo-1460925895917-afdab827c52f?w=600'}" style="width:100%; height:200px; object-fit:cover;">
                                        <div style="padding:20px;">
                                            <h3>${p.name}</h3>
                                            <p style="color:#718096;">${p.description || ''}</p>
                                        </div>
                                    </div>
                                `).join('') || ''}
                            </div>
                        </div>
                    </div>
                `;
            } else {
                return `
                    <div style="min-height:100vh; background:linear-gradient(135deg, ${c.primaryColor || '#10b981'}, ${c.secondaryColor || '#059669'}); display:flex; align-items:center; justify-content:center; padding:20px;">
                        <div style="background:white; border-radius:40px; padding:50px; text-align:center; max-width:500px; width:100%;">
                            <img src="${c.avatar || 'https://ui-avatars.com/api/?background=10b981&color=fff&size=200'}" style="width:120px; height:120px; border-radius:60px; margin-bottom:20px;">
                            <h1 style="margin-bottom:10px;">${c.name || 'João Santos'}</h1>
                            <p style="color:#718096; margin-bottom:30px;">${c.bio || 'Criador de conteúdo'}</p>
                            <div style="display:flex; flex-direction:column; gap:15px;">
                                ${c.links?.map(l => `
                                    <a href="${l.url}" style="display:block; padding:15px; background:#f7fafc; border-radius:12px; text-decoration:none; color:#2d3748; font-weight:500;">${l.title}</a>
                                `).join('') || ''}
                            </div>
                        </div>
                    </div>
                `;
            }
        }
        
        async function saveSite() {
            if (currentEditingSite) {
                await updateDoc(doc(db, 'sites', currentEditingSite.id), { content: currentEditingSite.content });
                showToast('✅ Site salvo com sucesso!', 'success');
                closeEditor();
                loadDashboard();
            }
        }
        
        function closeEditor() {
            currentEditingSite = null;
            showPage('dashboardPage');
            loadDashboard();
        }
        
        function openCreateModal() {
            document.getElementById('createModal').classList.add('active');
            document.querySelector('.template-card')?.classList.add('selected');
        }
        
        function closeCreateModal() {
            document.getElementById('createModal').classList.remove('active');
            document.getElementById('siteTitle').value = '';
            document.getElementById('siteSlug').value = '';
        }
        
        async function createSite() {
            const title = document.getElementById('siteTitle').value;
            const slug = document.getElementById('siteSlug').value;
            const templateId = document.getElementById('selectedTemplate').value;
            
            if (!title || !slug) {
                showToast('Preencha todos os campos', 'error');
                return;
            }
            
            try {
                const siteData = {
                    title: title,
                    slug: slug.toLowerCase().replace(/[^a-z0-9]/g, ''),
                    template: templateId,
                    content: JSON.parse(JSON.stringify(templates[templateId].structure)),
                    userId: currentUser.uid,
                    createdAt: new Date().toISOString(),
                    published: true
                };
                
                await addDoc(collection(db, 'sites'), siteData);
                showToast('✨ Site criado com sucesso!', 'success');
                closeCreateModal();
                loadDashboard();
            } catch (error) {
                showToast('Erro: ' + error.message, 'error');
            }
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        async function viewPublicSite(slug) {
            try {
                const q = query(collection(db, 'sites'), where('slug', '==', slug), where('published', '==', true));
                const snapshot = await getDocs(q);
                
                if (snapshot.empty) {
                    document.getElementById('app').innerHTML = `
                        <div style="min-height:100vh; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:20px;">
                            <i class="fas fa-search" style="font-size:64px; color:#cbd5e0;"></i>
                            <h2>🔍 Site não encontrado</h2>
                            <a href="/" style="color:#667eea;">← Voltar para WebCraft</a>
                        </div>
                    `;
                    return;
                }
                
                const site = snapshot.docs[0].data();
                document.getElementById('app').innerHTML = renderSitePreview(site);
                document.getElementById('app').innerHTML += `<footer style="text-align:center; padding:20px; background:#f7fafc; color:#a0aec0;">✨ Criado com <i class="fas fa-heart" style="color:#fc8181;"></i> WebCraft</footer>`;
            } catch (error) {
                document.getElementById('app').innerHTML = `<div style="padding:40px;">Erro: ${error.message}</div>`;
            }
        }
        
        renderApp();
        
        const slug = window.location.pathname.substring(1);
        if (slug && slug !== '') {
            viewPublicSite(slug);
        } else {
            onAuthStateChanged(auth, (user) => {
                currentUser = user;
                if (user) {
                    showPage('dashboardPage');
                    loadDashboard();
                } else {
                    showPage('loginPage');
                }
            });
        }
    </script>
</body>
</html>
